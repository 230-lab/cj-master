<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倉頡打字大師 - 專業文章練習</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            background: white;
            width: 90%;
            max-width: 900px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
        }

        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 1rem;
            outline: none;
        }

        .text-display {
            background: #fdfdfd;
            padding: 25px;
            border-radius: 12px;
            line-height: 2.2;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid #f0f0f0;
            min-height: 180px;
            word-wrap: break-word;
        }

        .char { color: var(--text); position: relative; transition: 0.1s; }
        .char-done { color: #ccc; }
        .char-active { 
            background: #fff3cd; 
            border-bottom: 4px solid var(--warning);
            font-weight: bold;
        }

        .input-area {
            text-align: center;
            margin: 30px 0;
        }

        .hint {
            font-size: 1.8rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 15px;
            height: 40px;
        }

        input#typingInput {
            width: 60%;
            font-size: 2.5rem;
            padding: 12px;
            text-align: center;
            border: 4px solid #eee;
            border-radius: 15px;
            outline: none;
            transition: 0.3s;
        }

        input#typingInput:focus { border-color: var(--accent); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 0.85rem; color: #7f8c8d; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 1.6rem; font-weight: bold; color: var(--primary); }

        /* 彈窗 Modal */
        #resultModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .rank-badge {
            font-size: 1.4rem;
            padding: 12px 25px;
            border-radius: 50px;
            display: inline-block;
            margin: 20px 0;
            font-weight: bold;
            color: white;
        }

        .btn-restart {
            background: var(--accent);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-restart:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>倉頡練習大師</h1>
        <select id="articleSelect"></select>
    </div>

    <div class="text-display" id="textDisplay"></div>

    <div class="input-area">
        <div class="hint" id="codeHint">請開始輸入...</div>
        <input type="text" id="typingInput" placeholder="輸入倉頡代碼" autofocus autocomplete="off">
    </div>

    <div class="stats-grid">
        <div class="stat-item"><span class="stat-label">完成進度</span><span class="stat-value" id="progressVal">0/0</span></div>
        <div class="stat-item"><span class="stat-label">WPM (速度)</span><span class="stat-value" id="wpmVal">0</span></div>
        <div class="stat-item"><span class="stat-label">時間 (秒)</span><span class="stat-value" id="timeVal">0</span></div>
        <div class="stat-item"><span class="stat-label">錯誤次數</span><span class="stat-value" id="mistakeVal" style="color:var(--danger)">0</span></div>
    </div>
</div>

<div id="resultModal">
    <div class="modal-content">
        <h2 style="margin-top:0;">練習結算報告</h2>
        <div style="font-size: 1.1rem;">最終速度</div>
        <div id="finalWpm" style="font-size: 3.5rem; font-weight: 900; color: var(--accent);">0</div>
        <div style="font-size: 1rem; margin-top:-5px;">Words Per Minute</div>
        
        <div id="rankBadge" class="rank-badge">計算中...</div>
        <p id="rankDesc" style="line-height: 1.6; color: #555; margin-bottom: 30px;"></p>
        
        <button class="btn-restart" onclick="closeModal()">再挑戰一次</button>
    </div>
</div>

<script>
// --- 數據庫：10篇文章 ---
const articles = [
    { title: "1. 科技與生活", content: "現代科技進步神速，智慧型手機已成為生活的核心。從早晨的鬧鐘到深夜的閱讀，我們依賴屏幕獲取資訊。人工智慧的發展更將自動化推向新高度。然而，在便利之餘，我們也應反思數位疲勞對健康的影響。適時放下手機，親近大自然，找回真實生活的節奏，才能在科技浪潮中保持身心平衡。" },
    { title: "2. 大自然的啟示", content: "走進深山密林，聽見溪水淙淙，看見綠葉繁茂。自然界每一處細節都充滿智慧。種子在泥土中靜默等待，直到春雨降臨才破土而出。這種生命力提醒我們，成長需要時間與耐性。環境保護不只是口號，更是對後代的責任。珍惜每一滴水與每一棵樹，讓這片土地能持續孕育希望與美麗。" },
    { title: "3. 美食的記憶", content: "廚房裡傳來陣陣飯菜香，那是童年最溫暖的回憶。紅燒肉的濃郁、清蒸魚的鮮甜，每一道菜都承載著家人的關愛。美食不僅是味蕾的享受，更是一種文化的傳承。在繁忙的城市生活中，親手為自己煮一頓飯，是最好的減壓方式。細細品味食材的原味，感受那份簡單卻純粹的幸福感。" },
    { title: "4. 閱讀的藝術", content: "書本是一扇通往世界的窗戶。透過文字，我們可以穿越時空，與古聖先賢對話，或探索遙遠的星系。閱讀能開闊視野，提升獨立思考的能力。在安靜的午後，翻開一本書，沉浸在優美的辭句中，靈魂也隨之昇華。文字的力量無窮，它能安慰受傷的心靈，也能點燃心中的熱情與理想。" },
    { title: "5. 城市散步", content: "漫步在街道上，觀察這座城市的律動。古老的紅磚牆與現代的玻璃帷幕並存，訴說著時代的變遷。巷弄裡的咖啡館飄出香氣，路人行色匆匆卻各有故事。城市是一本厚重的書，每一條街都是一個篇章。學會放慢腳步，你會發現平常忽略的美景，可能是牆角的野花，也可能是午後灑落在屋簷上的陽光。" },
    { title: "6. 運動的快樂", content: "汗水滑落臉頰，呼吸變得急促，心跳強而有力。運動帶來的暢快感無可比擬。無論是長跑、游泳還是打球，都能讓身體充滿能量。規律的運動不僅能增強體質，還能分泌多巴胺，讓人心情愉快。挑戰自己的極限，超越昨日的自我，這種成就感是最好的獎勵。讓我們動起來，擁抱健康的生活方式。" },
    { title: "7. 星空的奧秘", content: "仰望夜空，繁星點點，宇宙的廣闊讓人感到謙卑。數十億光年外的光芒，經過漫長的旅途才抵達我們的眼簾。銀河如一條流動的白練，橫跨天際。探索宇宙是人類永恆的夢想。科學家透過觀測，揭開黑洞與星系的祕密。在浩瀚的時空中，地球是我們唯一的家園，守護這顆藍色星球是我們共同的使命。" },
    { title: "8. 音樂的力量", content: "旋律起伏，節奏跳動，音樂是跨越國界的語言。它能表達難以言喻的情感，讓悲傷者得到慰藉，讓歡樂者更加激昂。古典樂的嚴謹優雅，流行樂的動感時尚，各有其獨特魅力。演奏樂器需要專注與練習，那是靈魂與指尖的共舞。當音樂響起，世界彷彿安靜了下來，只剩下心靈與音符的交織。" },
    { title: "9. 旅行的意義", content: "旅行不是為了逃避生活，而是為了不讓生活逃避我們。前往陌生的地方，遇見不同的人，體驗異地的風土人情。走出舒適圈，我們的感官會變得敏銳，心胸也會變得寬廣。在旅途中，我們學會適應與包容，也重新認識了自己。每一次歸來，都有了新的觀點與能量，讓原本平凡的日子變得更有意義。" },
    { title: "10. 友誼的價值", content: "真正的友誼像是一盞燈，在黑暗中為我們指引方向。朋友是那個理解你的沉默，支持你的夢想的人。在困難時伸出援手，在成功時共享喜悅。友誼需要真誠去經營，用時間去灌溉。雖然生活會改變，人們會各奔東西，但深厚的情誼經得起考驗。珍惜身邊每一位真心待你的朋友，那是人生最寶貴的財富。" }
];

// 核心字典
const cjDict = {"現":"mbuu","代":"op","科":"hdyj","技":"qje","進":"ytp","步":"ylh","神":"ifsh","速":"ylok","智":"omda","慧":"qjsh","型":"mgtn","手":"q","機":"udwi","已":"sc","成":"ihsh","為":"itrf","生":"hgm","活":"ehqr","的":"hdi","核":"dvo","心":"p","從":"ooo","早":"at","晨":"mmv","鬧":"lnly","鐘":"clg","到":"mgln","深":"eynd","夜":"yokx","閱":"lnru","讀":"lntm","我":"his","們":"onj","依":"oyv","賴":"dmlo","屏":"shjt","幕":"atbi","獲":"etue","取":"sj","資":"mbo","訊":"yrnj","人":"o","工":"m","發":"nomye","展":"shv","更":"mllk","將":"vmid","自":"hbd","動":"hks","化":"op","推":"qog","向":"hbr","新":"yldj","高":"ybr","度":"it","然":"bkf","而":"mbl","在":"gl","便":"omk","利":"hdln","之","i","餘":"onyd","也","p","應":"yogg","發":"nomye","反":"hke","思","wmp","數":"lvok","位":"oyt","疲":"hdk","勞":"ffs","對":"ytdi","健":"onlk","康":"ihe","影":"vfh","響":"vhlh","適":"ytpk","時":"agdi","放":"ysk","下":"m","親":"yldu","近":"yp","大":"k","察":"jmmf","找":"qi","回":"wr","真":"jtbc","實":"jtwi","節":"thpl","奏":"qhk","才":"dh","能":"itpp","浪":"eiv","潮":"ejbb","中":"l","保":"ord","持":"qghi","身":"hph","平":"mfs","衡":"hory"};
const keyMap = {'a':'日','b':'月','c':'金','d':'木','e':'水','f':'火','g':'土','h':'竹','i':'戈','j':'十','k':'大','l':'中','m':'一','n':'弓','o':'人','p':'心','q':'手','r':'口','s':'尸','t':'廿','u':'山','v':'女','w':'田','y':'卜'};

let currentText = "";
let currentIndex = 0;
let startTime = null;
let timerId = null;
let mistakes = 0;

const textDisplay = document.getElementById('textDisplay');
const typingInput = document.getElementById('typingInput');
const articleSelect = document.getElementById('articleSelect');

// 初始化選單
articles.forEach((art, i) => {
    let opt = document.createElement('option');
    opt.value = i;
    opt.innerText = art.title;
    articleSelect.appendChild(opt);
});

function loadArticle(idx) {
    currentText = articles[idx].content;
    currentIndex = 0;
    mistakes = 0;
    startTime = null;
    if(timerId) clearInterval(timerId);
    
    document.getElementById('timeVal').innerText = "0";
    document.getElementById('wpmVal').innerText = "0";
    document.getElementById('mistakeVal').innerText = "0";
    renderText();
    updateHint();
    typingInput.value = "";
}

function renderText() {
    textDisplay.innerHTML = "";
    currentText.split("").forEach((char, i) => {
        let span = document.createElement('span');
        span.innerText = char;
        span.className = "char " + (i < currentIndex ? "char-done" : (i === currentIndex ? "char-active" : ""));
        textDisplay.appendChild(span);
    });
    document.getElementById('progressVal').innerText = `${currentIndex}/${currentText.length}`;
}

function updateHint() {
    const char = currentText[currentIndex];
    const code = cjDict[char];
    if (!code) {
        document.getElementById('codeHint').innerText = "請輸入空白鍵跳過標點符號";
    } else {
        const chineseCode = code.split("").map(l => keyMap[l] || l).join("");
        document.getElementById('codeHint').innerText = `${char}：${chineseCode} (${code.toUpperCase()})`;
    }
}

typingInput.addEventListener('input', (e) => {
    if(!startTime) {
        startTime = new Date();
        timerId = setInterval(updateStats, 1000);
    }

    const val = e.target.value.toLowerCase().trim();
    const char = currentText[currentIndex];
    const correctCode = cjDict[char];

    // 處理標點符號
    if (!correctCode) {
        currentIndex++;
        typingInput.value = "";
        checkFinish();
        return;
    }

    if (val === correctCode) {
        currentIndex++;
        typingInput.value = "";
        checkFinish();
    } else if (val.length >= correctCode.length) {
        mistakes++;
        document.getElementById('mistakeVal').innerText = mistakes;
        typingInput.value = "";
    }
});

function updateStats() {
    const elapsed = Math.floor((new Date() - startTime) / 1000);
    document.getElementById('timeVal').innerText = elapsed;
    if (elapsed > 0) {
        const wpm = Math.round((currentIndex / elapsed) * 60);
        document.getElementById('wpmVal').innerText = wpm;
    }
}

function checkFinish() {
    if (currentIndex >= currentText.length) {
        clearInterval(timerId);
        showResult();
    } else {
        renderText();
        updateHint();
    }
}

function showResult() {
    const wpm = document.getElementById('wpmVal').innerText;
    document.getElementById('finalWpm').innerText = wpm;
    
    const badge = document.getElementById('rankBadge');
    const desc = document.getElementById('rankDesc');
    
    if (wpm >= 76) {
        badge.innerText = "🏆 神速大師";
        badge.style.backgroundColor = "#9b59b6";
        desc.innerText = "你的打字速度簡直不可思議！已經達到專業速記員的水平，對倉頡拆碼的肌肉記憶非常深厚。";
    } else if (wpm >= 51) {
        badge.innerText = "🌟 熟練寫手";
        badge.style.backgroundColor = var(--success);
        desc.innerText = "非常出色！你已經超越了絕大多數的辦公室使用者，能流暢地將思考轉化為文字。";
    } else if (wpm >= 31) {
        badge.innerText = "✅ 一般辦公";
        badge.style.backgroundColor = var(--accent);
        desc.innerText = "合格！你的速度應付日常文書處理綽綽有餘，繼續練習將會更快。";
    } else if (wpm >= 16) {
        badge.innerText = "🌱 初階水平";
        badge.style.backgroundColor = var(--warning);
        desc.innerText = "你已經掌握了基本拆碼邏輯，目前正處於成長期。多練習常用字，速度會突飛猛進。";
    } else {
        badge.innerText = "🥚 新手入門";
        badge.style.backgroundColor = "#95a5a6";
        desc.innerText = "萬事起頭難！現在的你正在建立基礎，建議多留意字根對應位置，不要急於求快。";
    }
    
    document.getElementById('resultModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('resultModal').style.display = 'none';
    loadArticle(articleSelect.value);
}

articleSelect.onchange = (e) => loadArticle(e.target.value);
loadArticle(0);
</script>

</body>
</html>
