<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文打字實戰 - 精準比對版</title>
    <style>
        :root { --bg: #f8fafc; --primary: #6366f1; --text-main: #1e293b; --text-done: #cbd5e1; --error: #ef4444; --active-bg: #eef2ff; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 90%; max-width: 850px; padding: 40px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; }
        select { padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; }
        #textDisplay { font-size: 1.8rem; line-height: 2; padding: 25px; background: #ffffff; border-radius: 12px; margin-bottom: 30px; border: 1px solid #f1f5f9; min-height: 120px; word-break: break-all; }
        
        .char { color: var(--text-main); transition: 0.1s; border-bottom: 3px solid transparent; }
        .char-done { color: var(--text-done); }
        .char-wrong { color: var(--error); border-bottom: 3px solid var(--error); background: #fee2e2; }
        .char-active { background: var(--active-bg); color: var(--primary); border-bottom: 3px solid var(--primary); font-weight: bold; }

        .input-box { text-align: center; margin-bottom: 30px; }
        input#typingInput { width: 95%; font-size: 1.8rem; padding: 15px; border: 3px solid #e2e8f0; border-radius: 15px; outline: none; transition: 0.3s; }
        input#typingInput:focus { border-color: var(--primary); }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-card { background: #f8fafc; padding: 15px; border-radius: 12px; text-align: center; }
        .label { font-size: 0.8rem; color: #64748b; display: block; margin-bottom: 5px; }
        .value { font-size: 1.6rem; font-weight: 700; }

        /* 結果視窗樣式 */
        #resultModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 40px; border-radius: 24px; text-align: center; max-width: 500px; width: 90%; }
        .rank-list { text-align: left; margin: 20px 0; background: #f1f5f9; padding: 15px; border-radius: 12px; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 10px; border-radius: 6px; margin-bottom: 4px; color: #64748b; }
        .rank-item.active { background: var(--primary); color: white; font-weight: bold; }
        button { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="color:var(--primary); margin:0;">中文打字實戰 (精準比對版)</h2>
        <select id="articleSelect"></select>
    </header>
    <div id="textDisplay"></div>
    <div class="input-box">
        <input type="text" id="typingInput" placeholder="在此開始輸入內容..." autofocus autocomplete="off">
    </div>
    <div class="dashboard">
        <div class="stat-card"><span class="label">總進度</span><span class="value" id="progressVal">0/0</span></div>
        <div class="stat-card"><span class="label">目前速度 WPM</span><span class="value" id="wpmVal">0</span></div>
        <div class="stat-card"><span class="label">計時</span><span class="value" id="timeVal">0s</span></div>
    </div>
</div>

<div id="resultModal">
    <div class="modal-content">
        <h2 style="margin-top:0;">測試完成！</h2>
        <p>您的平均速度：<span id="finalWpm" style="font-size: 2.5rem; font-weight: 900; color: var(--primary);">0</span> WPM</p>
        
        <div class="rank-list" id="rankList">
            <div class="rank-item" id="rank-pro"><span>🏆 專業速錄級</span><span>60+ WPM</span></div>
            <div class="rank-item" id="rank-qualified"><span>🌟 業界合格級</span><span>40-60 WPM</span></div>
            <div class="rank-item" id="rank-basic"><span>🌱 基礎穩定級</span><span>20-40 WPM</span></div>
            <div class="rank-item" id="rank-novice"><span>🥚 初心練習級</span><span>0-20 WPM</span></div>
        </div>
        
        <p id="rankFeedback" style="color: #64748b; font-size: 0.95rem;"></p>
        <button onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
const articles = [
    { title: "1. 科技與生活", content: "現代科技進步神速，智慧型手機已成為生活的核心。從早晨的鬧鐘到深夜的閱讀，我們依賴屏幕獲取資訊。人工智慧的發展更將自動化推向新高度。然而，在便利之餘，我們也應反思數位疲勞對健康的影響。適時放下手機，親近大自然，找回真實生活的節奏，才能在科技浪潮中保持身心平衡。" },
    { title: "2. 大自然的啟示", content: "走進深山密林，聽見溪水淙淙，看見綠葉繁茂。自然界每一處細節都充滿智慧。種子在泥土中靜默等待，直到春雨降臨才破土而出。這種生命力提醒我們，成長需要時間與耐性。環境保護不只是口號，更是對後代的責任。珍惜每一滴水與每一棵樹，讓這片土地能持續孕育希望與美麗。" }
];

let sentenceStartIdx = 0; // 當前句子的起始索引
let currentIdx = 0;       // 總進度索引
let articleText = "";
let startTime = null;
let timer = null;

const textDisplay = document.getElementById('textDisplay');
const typingInput = document.getElementById('typingInput');
const articleSelect = document.getElementById('articleSelect');

articles.forEach((a, i) => {
    let opt = document.createElement('option');
    opt.value = i; opt.innerText = a.title;
    articleSelect.appendChild(opt);
});

function init(idx) {
    articleText = articles[idx].content;
    currentIdx = 0; sentenceStartIdx = 0; startTime = null;
    clearInterval(timer);
    typingInput.value = "";
    render();
}

function render(inputValue = "") {
    let html = "";
    const puncRegex = /[，。？！；：、]/;

    for (let i = 0; i < articleText.length; i++) {
        let char = articleText[i];
        let cls = "char";
        
        // 已完成的句子
        if (i < sentenceStartIdx) {
            cls += " char-done";
        } 
        // 正在輸入的區塊
        else if (i >= sentenceStartIdx && i < sentenceStartIdx + inputValue.length) {
            let inputChar = inputValue[i - sentenceStartIdx];
            if (inputChar === char) {
                cls += " char-done"; // 輸入正確
            } else {
                cls += " char-wrong"; // 輸入錯誤
            }
        }
        // 下一個目標字
        if (i === sentenceStartIdx + inputValue.length) {
            cls += " char-active";
        }
        
        html += `<span class="${cls}">${char}</span>`;
    }
    
    textDisplay.innerHTML = html;
    document.getElementById('progressVal').innerText = `${currentIdx}/${articleText.length}`;
}

typingInput.addEventListener('input', (e) => {
    if (!startTime) {
        startTime = new Date();
        timer = setInterval(updateStats, 1000);
    }

    const val = e.target.value;
    const puncRegex = /[，。？！；：、]/;
    
    // 更新當前總進度 (起始位置 + 目前框內字數)
    currentIdx = sentenceStartIdx + val.length;

    // 檢查是否打到句末標點
    if (val.length > 0) {
        const lastCharTyped = val[val.length - 1];
        const lastTargetChar = articleText[sentenceStartIdx + val.length - 1];
        
        // 如果打對了標點符號，且該標點是句末標點
        if (lastCharTyped === lastTargetChar && puncRegex.test(lastCharTyped)) {
            sentenceStartIdx = currentIdx; // 移動句子起始點
            typingInput.value = "";        // 清空輸入框
            render("");
        } else {
            render(val);
        }
    } else {
        render("");
    }

    // 檢查是否全文結束
    if (currentIdx >= articleText.length) {
        clearInterval(timer);
        setTimeout(showResult, 300);
    }
});

function updateStats() {
    const sec = Math.floor((new Date() - startTime) / 1000);
    document.getElementById('timeVal').innerText = sec + "s";
    const wpm = Math.round((currentIdx / (sec || 1)) * 60);
    document.getElementById('wpmVal').innerText = wpm;
}

function showResult() {
    const wpm = parseInt(document.getElementById('wpmVal').innerText);
    document.getElementById('finalWpm').innerText = wpm;
    
    // 重置列表樣式
    document.querySelectorAll('.rank-item').forEach(el => el.classList.remove('active'));
    const feedback = document.getElementById('rankFeedback');

    if (wpm >= 60) {
        document.getElementById('rank-pro').classList.add('active');
        feedback.innerText = "頂尖表現！您已具備專業速錄師的實力。";
    } else if (wpm >= 40) {
        document.getElementById('rank-qualified').classList.add('active');
        feedback.innerText = "非常出色！您已達標政府及企業要求的專業辦公速度。";
    } else if (wpm >= 20) {
        document.getElementById('rank-basic').classList.add('active');
        feedback.innerText = "表現穩定。已能勝任一般的日常文書與電郵處理。";
    } else {
        document.getElementById('rank-novice').classList.add('active');
        feedback.innerText = "還在熱身中。持續練習，手感會越來越好！";
    }
    
    document.getElementById('resultModal').style.display = 'flex';
}

articleSelect.onchange = (e) => init(e.target.value);
init(0);
</script>
</body>
</html>
